<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">

  <!-- Styles -->
  <style>
    text { font-family: Arial, sans-serif; font-size: 14px; }
    .box { fill: #FFF2CC; stroke: #D6B656; stroke-width: 2; rx: 8; ry: 8; }
    .process { fill: #E1D5E7; stroke: #9673A6; stroke-width: 2; rx: 8; ry: 8; }
    .cylinder { fill: #DAE8FC; stroke: #6C8EBF; stroke-width: 2; }
    .cylinder-top { fill: #AFCDEA; }
    .kg { fill: #D5E8D4; stroke: #82B366; stroke-width: 2; }
    .hex { fill: #F1F8E9; stroke: #7CB342; stroke-width: 2; }
    .ellipse { fill: #FFE6CC; stroke: #D79B00; stroke-width: 2; }
    .arrow { stroke: black; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
      refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Ecommerce-Data-MLOps -->
  <rect x="60" y="80" width="200" height="80" class="box" />
  <text x="160" y="115" text-anchor="middle">Ecommerce-Data-MLOps</text>
  <text x="160" y="135" text-anchor="middle">(Main Codebase)</text>

  <!-- GitHub API (cylinder) -->
  <ellipse cx="390" cy="80" rx="70" ry="15" class="cylinder-top" />
  <rect x="320" y="80" width="140" height="60" class="cylinder" />
  <ellipse cx="390" cy="140" rx="70" ry="15" class="cylinder" />
  <text x="390" y="115" text-anchor="middle">GitHub API</text>

  <!-- Data Fetching Scripts -->
  <rect x="520" y="80" width="200" height="80" class="process" />
  <text x="620" y="115" text-anchor="middle">Data_Fetching Scripts</text>

  <!-- Arrows -->
  <line x1="260" y1="120" x2="320" y2="120" class="arrow"/>
  <line x1="460" y1="120" x2="520" y2="120" class="arrow"/>

  <!-- Combined Data -->
  <rect x="330" y="220" width="240" height="80" class="process" fill="#F8CECC" stroke="#B85450"/>
  <text x="450" y="250" text-anchor="middle">Combined Source Data</text>
  <text x="450" y="270" text-anchor="middle">(Repo Files + API Metadata)</text>

  <line x1="620" y1="160" x2="450" y2="220" class="arrow"/>

  <!-- Testing_GitHub_Code -->
  <rect x="60" y="220" width="200" height="80" class="box" />
  <text x="160" y="255" text-anchor="middle">Testing_GitHub_Code</text>
  <text x="160" y="275" text-anchor="middle">(Pipeline Scripts)</text>

  <line x1="160" y1="160" x2="160" y2="220" class="arrow"/>

  <!-- KG (cylinder) -->
  <ellipse cx="450" cy="360" rx="80" ry="15" class="kg"/>
  <rect x="370" y="360" width="160" height="80" class="kg"/>
  <ellipse cx="450" cy="440" rx="80" ry="15" class="kg"/>
  <text x="450" y="400" text-anchor="middle" font-size="16" font-weight="bold">Knowledge Graph (KG)</text>

  <line x1="450" y1="300" x2="450" y2="360" class="arrow"/>

  <!-- Code_Summarization Folder -->
  <rect x="60" y="360" width="200" height="100" class="box" />
  <text x="160" y="405" text-anchor="middle">Code_Summarization</text>
  <text x="160" y="425" text-anchor="middle">(LLM Scripts)</text>

  <line x1="370" y1="400" x2="260" y2="400" class="arrow"/>

  <!-- LLM Hexagon -->
  <polygon points="330,520 410,520 470,570 410,620 330,620 270,570"
           class="hex"/>
  <text x="370" y="565" text-anchor="middle" font-size="16">LLM</text>
  <text x="370" y="585" text-anchor="middle">(GPT / Transformer)</text>

  <line x1="450" y1="440" x2="370" y2="520" class="arrow"/>

  <!-- Output Ellipse -->
  <ellipse cx="650" cy="570" rx="120" ry="50" class="ellipse"/>
  <text x="650" y="570" text-anchor="middle" font-size="16" font-weight="bold">
    Generated Code Summaries
  </text>

  <line x1="470" y1="570" x2="530" y2="570" class="arrow"/>

</svg>
